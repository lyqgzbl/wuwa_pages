<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸣潮辅助工具合集</title>
    <style>
        :root {
            --bg: #fafafa;
            --bg-alpha: rgba(250, 250, 250, 0.65);
            --text: #2d3748;
            --text-muted: #718096;
            --card-bg: #ffffff;
            --card-hover: #f7fafc;
            --border: rgba(0, 0, 0, 0.06);
            --accent: #4f46e5;
            --accent-light: rgba(79, 70, 229, 0.1);
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 8px 16px -4px rgba(0, 0, 0, 0.05), 0 4px 8px -2px rgba(0, 0, 0, 0.02);
            --badge-bg: rgba(79, 70, 229, 0.1);
            --badge-text: #4f46e5;
            --card-gradient: linear-gradient(145deg, #ffffff, #fafafa);
            color-scheme: light dark;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --bg-alpha: rgba(15, 23, 42, 0.65);
                --text: #f1f5f9;
                --text-muted: #94a3b8;
                --card-bg: #1e293b;
                --card-hover: #27344c;
                --border: rgba(255, 255, 255, 0.06);
                --accent: #38bdf8;
                --accent-light: rgba(56, 189, 248, 0.15);
                --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.2);
                --shadow-md: 0 8px 16px -4px rgba(0, 0, 0, 0.3), 0 4px 8px -2px rgba(0, 0, 0, 0.2);
                --badge-bg: rgba(56, 189, 248, 0.15);
                --badge-text: #38bdf8;
                --card-gradient: linear-gradient(145deg, #1e293b, #151e2f);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .tool-card {
            display: flex;
            flex-direction: column;
            background: var(--card-gradient);
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: var(--text);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .tool-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            background-color: var(--card-hover);
            border-color: var(--accent);
        }

        .tool-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: var(--accent);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .tool-card:hover::before {
            opacity: 1;
        }

        .tool-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--accent);
        }

        .tool-desc {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>鸣潮辅助工具合集</h1>
        <div class="tool-list">
            <a href="/achievement/" class="tool-card">
                <span class="tool-title">成就统计工具</span>
                <p class="tool-desc">离线成就勾选页面</p>
            </a>
            <a href="/quest/" class="tool-card">
                <span class="tool-title">任务统计工具</span>
                <p class="tool-desc">离线任务勾选页面</p>
            </a>
        </div>
    </div>
</body>
</html>
